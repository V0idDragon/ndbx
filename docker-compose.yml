services:
  app:
    build: .
    env_file:
      - .env.local
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      - redis
      - mongodb
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
    - "${MONGODB_PORT}:${MONGODB_PORT}"  